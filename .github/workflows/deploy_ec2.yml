name: "Entrega Contínua EC2"

on:
  push:
    branches: [ "main" ]

jobs:

  deploy_ec2:
    runs-on: ubuntu-latest
    environment: prod
    steps:
    - name: Code checkout 
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build
      run: go build main.go

    - name: SCP to EC2
      uses: appleboy/scp-action@v1
      with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME}}
          key: ${{ secrets.EC2_SECRET_KEY }}
          source: "templates,assets,main"
          target: /home/${{ secrets.EC2_USERNAME }}
    
    - name: Restart Service
      uses: appleboy/ssh-action@v1
      with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME}}
          key: ${{ secrets.EC2_SECRET_KEY }}
          script: sudo systemctl restart projeto

    - name: Notify Discord about Deploy EC2
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        ARTIFACT_NAME="compiled_project"
        BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        URL="http://${{ secrets.EC2_HOST }}:8080"

        curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"✅ **Deploy realizado com sucesso na instância EC2**\n🧱 Por: **${{ github.actor }}**\n🔗 [Acessar Aplicação]($URL)\"
          }" \
        $DISCORD_WEBHOOK